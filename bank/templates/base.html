{% load static %}
<!DOCTYPE html>
<html>

<head>

    <title>SafeBank</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link
    rel="stylesheet"
    href="{% static 'css/style.css' %}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark p-3">

    <div class="container">

        <a class="navbar-brand" href="/">
            SafeBank
        </a>

        <div>

            <a href="/check-balance/"
               class="btn btn-success">
               Check Balance
            </a>

            <a href="/transfer/"
               class="btn btn-info">
               Transfer
            </a>

            <a href="/transactions/"
               class="btn btn-primary">
               Transactions
            </a>

            <a href="/logout/"
               class="btn btn-danger">
               Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>

</html>
