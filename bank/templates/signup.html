{% extends 'base.html' %}

{% block content %}

<div
    class="d-flex justify-content-center align-items-center"
    style="min-height:80vh;"
>

    <div
        class="card p-5"
        style="width:500px;"
    >

        <h2 class="text-center mb-4">
            Signup
        </h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-primary w-100"
            >
                Signup
            </button>

        </form>

        <br>

        <a
            href="/login/"
            class="text-center"
        >
            Already have an account?
        </a>

    </div>

</div>

{% endblock %}
