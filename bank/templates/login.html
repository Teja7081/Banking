{% extends 'base.html' %}

{% block content %}

<div
    class="d-flex justify-content-center align-items-center"
    style="min-height:80vh;"
>

    <div
        class="card p-5"
        style="width:450px;"
    >

        <h2 class="text-center mb-4">
            Login
        </h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                type="submit"
                class="btn btn-success w-100"
            >
                Login
            </button>

        </form>

        <br>

        <a
            href="/signup/"
            class="text-center"
        >
            Create New Account
        </a>

    </div>

</div>

{% endblock %}
